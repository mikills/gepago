name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Format
        run: make fmt

      - name: Check formatting
        run: git diff --exit-code

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Staticcheck
        run: make staticcheck
